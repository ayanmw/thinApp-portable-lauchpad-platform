<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用详情 - AI ThinApp Launchpad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .toggle-checkbox:checked {
            background-color: #667eea;
        }
        .toggle-checkbox:checked + .toggle-label {
            transform: translateX(100%);
            border-color: #667eea;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <button onclick="window.location.href='index.html'" class="p-2 hover:bg-gray-100 rounded-lg transition">
                        <i class="fas fa-arrow-left text-xl text-gray-700"></i>
                    </button>
                    <div class="flex items-center">
                        <i class="fas fa-info-circle text-2xl text-purple-600"></i>
                        <span class="ml-2 text-xl font-bold text-gray-900">应用详情</span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium">
                        <i class="fas fa-play mr-2"></i>启动
                    </button>
                    <button class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                        <i class="fas fa-trash mr-2"></i>删除
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 应用基本信息 -->
        <div class="bg-white rounded-xl shadow-md p-8 mb-6">
            <div class="flex items-start space-x-6">
                <div class="w-24 h-24 bg-gradient-to-br from-blue-400 to-blue-600 rounded-2xl flex items-center justify-center text-white text-5xl shadow-lg">
                    <i class="fab fa-qq"></i>
                </div>
                <div class="flex-1">
                    <div class="flex items-center justify-between mb-2">
                        <h1 class="text-3xl font-bold text-gray-900">QQ</h1>
                        <span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-medium">已安装</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm text-gray-600 mb-4">
                        <div><i class="fas fa-tag mr-2 text-gray-400"></i>版本: 9.9.15</div>
                        <div><i class="fas fa-building mr-2 text-gray-400"></i>开发商: Tencent</div>
                        <div><i class="fas fa-folder mr-2 text-gray-400"></i>安装位置: D:\ThinAppApps\QQ</div>
                        <div><i class="fas fa-calendar mr-2 text-gray-400"></i>添加时间: 2026-05-20</div>
                    </div>
                    <p class="text-gray-600">QQ是腾讯公司开发的一款即时通讯软件，支持文字、语音、视频通话等多种沟通方式。</p>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="flex space-x-4">
                <button class="flex-1 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium text-lg">
                    <i class="fas fa-play mr-2"></i>启动应用
                </button>
                <button class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-lg">
                    <i class="fas fa-folder-open mr-2"></i>打开目录
                </button>
                <button class="flex-1 px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium text-lg">
                    <i class="fas fa-trash mr-2"></i>删除应用
                </button>
            </div>
        </div>

        <!-- 沙箱状态 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">
                <i class="fas fa-shield-alt mr-2 text-purple-600"></i>沙箱状态
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="text-sm text-gray-500 mb-1">运行状态</div>
                    <div class="text-lg font-semibold text-green-600">
                        <i class="fas fa-check-circle mr-1"></i>运行中
                    </div>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="text-sm text-gray-500 mb-1">实例数量</div>
                    <div class="text-lg font-semibold text-gray-900">2 个</div>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="text-sm text-gray-500 mb-1">沙箱大小</div>
                    <div class="text-lg font-semibold text-gray-900">156.8 MB</div>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="text-sm text-gray-500 mb-1">重定向文件</div>
                    <div class="text-lg font-semibold text-gray-900">342 个</div>
                </div>
            </div>
        </div>

        <!-- 高级设置 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">
                <i class="fas fa-cog mr-2 text-gray-600"></i>高级设置
            </h2>
            
            <!-- 启用沙箱开关 -->
            <div class="flex items-center justify-between py-4 border-b border-gray-200">
                <div>
                    <div class="font-medium text-gray-900">启用沙箱</div>
                    <div class="text-sm text-gray-500">为应用创建独立的运行环境</div>
                </div>
                <div class="relative inline-block w-12 h-6">
                    <input type="checkbox" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer" checked>
                    <label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <!-- 文件重定向开关 -->
            <div class="flex items-center justify-between py-4 border-b border-gray-200">
                <div>
                    <div class="font-medium text-gray-900">文件重定向</div>
                    <div class="text-sm text-gray-500">将文件操作重定向到应用目录</div>
                </div>
                <div class="relative inline-block w-12 h-6">
                    <input type="checkbox" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer" checked>
                    <label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <!-- 注册表重定向开关 -->
            <div class="flex items-center justify-between py-4 border-b border-gray-200">
                <div>
                    <div class="font-medium text-gray-900">注册表重定向</div>
                    <div class="text-sm text-gray-500">将注册表操作重定向到虚拟注册表</div>
                </div>
                <div class="relative inline-block w-12 h-6">
                    <input type="checkbox" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer" checked>
                    <label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <!-- 启动参数 -->
            <div class="py-4 border-b border-gray-200">
                <div class="font-medium text-gray-900 mb-2">启动参数</div>
                <input type="text" placeholder="例如: --disable-gpu --no-sandbox" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                <div class="text-sm text-gray-500 mt-1">可选：添加应用启动时的命令行参数</div>
            </div>

            <!-- 工作目录 -->
            <div class="py-4">
                <div class="font-medium text-gray-900 mb-2">工作目录</div>
                <div class="flex space-x-2">
                    <input type="text" value="D:\ThinAppApps\QQ" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" readonly>
                    <button class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                        <i class="fas fa-folder-open mr-2"></i>浏览
                    </button>
                </div>
                <div class="text-sm text-gray-500 mt-1">应用运行时的当前工作目录</div>
            </div>
        </div>

        <!-- 危险操作 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6 border-2 border-red-200">
            <h2 class="text-xl font-bold text-red-600 mb-4">
                <i class="fas fa-exclamation-triangle mr-2"></i>危险操作
            </h2>
            <div class="space-y-4">
                <button class="w-full px-6 py-3 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition font-medium">
                    <i class="fas fa-undo mr-2"></i>重置沙箱
                </button>
                <button class="w-full px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                    <i class="fas fa-trash mr-2"></i>删除应用及沙箱数据
                </button>
            </div>
        </div>
    </div>

    <script>
        // Toggle switch functionality
        document.querySelectorAll('.toggle-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    this.nextElementSibling.style.backgroundColor = '#667eea';
                    this.nextElementSibling.style.transform = 'translateX(100%)';
                } else {
                    this.nextElementSibling.style.backgroundColor = '#d1d5db';
                    this.nextElementSibling.style.transform = 'translateX(0)';
                }
            });
        });
    </script>
</body>
</html>
