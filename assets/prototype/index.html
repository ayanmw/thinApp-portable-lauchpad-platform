<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ThinApp Launchpad - 应用库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .card:hover .launch-btn {
            opacity: 1 !important;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .filter-btn {
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <i class="fas fa-rocket text-2xl text-purple-600"></i>
                        <span class="ml-2 text-xl font-bold text-gray-900">AI ThinApp Launchpad</span>
                    </div>
                </div>
                <div class="flex-1 max-w-lg mx-8">
                    <div class="relative">
                        <input type="text" placeholder="搜索应用..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="window.location.href='store.html'" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                        <i class="fas fa-store mr-2"></i>软件商店
                    </button>
                    <button onclick="window.location.href='onboarding.html'" class="p-2 text-gray-600 hover:text-gray-900 transition">
                        <i class="fas fa-question-circle text-xl"></i>
                    </button>
                    <button class="p-2 text-gray-600 hover:text-gray-900 transition">
                        <i class="fas fa-cog text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 分类筛选 -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <button class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                    <i class="fas fa-plus mr-2"></i>添加应用
                </button>
                <div class="flex space-x-2">
                    <button onclick="filterApps('all')" class="filter-btn active px-4 py-2 rounded-lg border border-gray-300 hover:border-purple-500 transition">
                        全部
                    </button>
                    <button onclick="filterApps('office')" class="filter-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-purple-500 transition">
                        <i class="fas fa-briefcase mr-1"></i>办公
                    </button>
                    <button onclick="filterApps('dev')" class="filter-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-purple-500 transition">
                        <i class="fas fa-code mr-1"></i>开发
                    </button>
                    <button onclick="filterApps('game')" class="filter-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-purple-500 transition">
                        <i class="fas fa-gamepad mr-1"></i>游戏
                    </button>
                    <button onclick="filterApps('tool')" class="filter-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-purple-500 transition">
                        <i class="fas fa-tools mr-1"></i>工具
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 应用卡片网格 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- QQ -->
            <div class="card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="window.location.href='app-detail.html'" data-category="office">
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-blue-600 rounded-xl flex items-center justify-center text-white text-3xl">
                            <i class="fab fa-qq"></i>
                        </div>
                        <span class="status-badge bg-green-100 text-green-800">已安装</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-1">QQ</h3>
                    <p class="text-sm text-gray-500 mb-4">版本: 9.9.15</p>
                    <div class="launch-btn opacity-0 transition-opacity">
                        <button class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-play mr-2"></i>启动
                        </button>
                    </div>
                </div>
            </div>

            <!-- 微信 -->
            <div class="card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="window.location.href='app-detail.html'" data-category="office">
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-green-600 rounded-xl flex items-center justify-center text-white text-3xl">
                            <i class="fab fa-weixin"></i>
                        </div>
                        <span class="status-badge bg-green-100 text-green-800">已安装</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-1">微信</h3>
                    <p class="text-sm text-gray-500 mb-4">版本: 3.9.5</p>
                    <div class="launch-btn opacity-0 transition-opacity">
                        <button class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-play mr-2"></i>启动
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chrome -->
            <div class="card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="window.location.href='app-detail.html'" data-category="tool">
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-red-500 rounded-xl flex items-center justify-center text-white text-3xl">
                            <i class="fab fa-chrome"></i>
                        </div>
                        <span class="status-badge bg-blue-100 text-blue-800">运行中</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-1">Chrome</h3>
                    <p class="text-sm text-gray-500 mb-4">版本: 120.0.6099</p>
                    <div class="launch-btn opacity-0 transition-opacity">
                        <button class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-play mr-2"></i>启动
                        </button>
                    </div>
                </div>
            </div>

            <!-- VSCode -->
            <div class="card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="window.location.href='app-detail.html'" data-category="dev">
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white text-3xl">
                            <i class="fas fa-code"></i>
                        </div>
                        <span class="status-badge bg-blue-100 text-blue-800">运行中</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-1">VSCode</h3>
                    <p class="text-sm text-gray-500 mb-4">版本: 1.85.1</p>
                    <div class="launch-btn opacity-0 transition-opacity">
                        <button class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-play mr-2"></i>启动
                        </button>
                    </div>
                </div>
            </div>

            <!-- Photoshop -->
            <div class="card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="window.location.href='app-detail.html'" data-category="tool">
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-900 to-purple-900 rounded-xl flex items-center justify-center text-white text-3xl">
                            <i class="fas fa-palette"></i>
                        </div>
                        <span class="status-badge bg-gray-100 text-gray-800">未安装</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-1">Photoshop</h3>
                    <p class="text-sm text-gray-500 mb-4">版本: 25.0</p>
                    <div class="launch-btn opacity-0 transition-opacity">
                        <button class="w-full px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                            <i class="fas fa-download mr-2"></i>安装
                        </button>
                    </div>
                </div>
            </div>

            <!-- Notion -->
            <div class="card bg-white rounded-xl shadow-md overflow-hidden cursor-pointer" onclick="window.location.href='app-detail.html'" data-category="office">
                <div class="p-6">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 bg-gradient-to-br from-black to-gray-800 rounded-xl flex items-center justify-center text-white text-3xl">
                            <i class="fas fa-sticky-note"></i>
                        </div>
                        <span class="status-badge bg-green-100 text-green-800">已安装</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-1">Notion</h3>
                    <p class="text-sm text-gray-500 mb-4">版本: 2.0.3</p>
                    <div class="launch-btn opacity-0 transition-opacity">
                        <button class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-play mr-2"></i>启动
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-2">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-4 text-sm text-gray-600">
                <span><i class="fas fa-check-circle text-green-500 mr-1"></i>2 个应用运行中</span>
                <span><i class="fas fa-shield-alt text-purple-500 mr-1"></i>沙箱模式已启用</span>
            </div>
            <div class="text-sm text-gray-500">
                AI ThinApp Launchpad Platform © 2026
            </div>
        </div>
    </div>

    <script>
        function filterApps(category) {
            const cards = document.querySelectorAll('.card');
            const buttons = document.querySelectorAll('.filter-btn');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            cards.forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
